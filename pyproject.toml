[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers"
markers = [
    "integration: hits the real Netvue cloud; requires BIRDFY_EMAIL/BIRDFY_PASSWORD",
]

[tool.ruff]
line-length = 110
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = [
    "E501",  # line length handled by formatter, not blocker
    "E741",  # ambiguous names ok in short scopes
]
