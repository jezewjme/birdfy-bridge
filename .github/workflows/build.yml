name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Unit tests
        # Coverage is reported per file for visibility only — no --cov-fail-under,
        # so a low number never fails the build. NOTE: these are WHOLE-FILE
        # numbers; the low ones (webrtc_client, birdfy_api, _rtp_forwarder) are
        # dominated by live-network / WebRTC / ffmpeg-subprocess paths that need a
        # real camera and aren't unit-testable. The logic added in unit-testable
        # form is covered (~82% of changed lines).
        run: |
          pytest -q \
            --cov=mqtt_control --cov=birdfy_api --cov=main \
            --cov=webrtc_client --cov=_rtp_forwarder --cov=_aiortc_media_patches \
            --cov-report=term-missing --no-cov-on-fail

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          push: false
          tags: birdfy-bridge:ci
          load: true
      - name: Smoke test image
        run: docker run --rm --entrypoint python birdfy-bridge:ci -c "import birdfy_api, webrtc_client; print('ok')"
